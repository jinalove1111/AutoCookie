name: backend-tests

# CTO evaluation (2026-07-19, docs/CTO_PLATFORM_EVALUATION.md): the first
# CI pipeline this repository has ever had. 791 tests existed and were
# run manually before this file -- nothing automatically caught a
# regression on push/PR until now. Pure repo/dev-infra: does not touch
# scripts/run_paper.py, RiskManager.evaluate(), or any trading-decision
# code, and cannot affect production trading behavior -- it only runs
# the existing test suite (backend/tests/, sqlite-backed, no real
# network/exchange calls in the suite itself beyond what individual
# tests already mock or explicitly skip).

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        # Milestone 37: the plain one-liner this replaced gave no way to
        # see *why* a run failed without authenticated GitHub API/gh-CLI
        # access to job logs (confirmed the hard way -- three separate
        # local reproduction attempts, all passing, never found the
        # Linux-specific root cause, purely because the pytest traceback
        # was unreachable). `PIPESTATUS[0]` (not `$?`, which would read
        # `tee`'s own exit code) preserves pytest's real pass/fail signal
        # through the pipe; the log file feeds the two visibility steps
        # below.
        run: |
          set +e
          python -m pytest tests/ -q 2>&1 | tee pytest_output.log
          exit_code=${PIPESTATUS[0]}
          exit "$exit_code"

      - name: Write job summary (human-readable, needs the Summary tab UI)
        if: always()
        run: |
          {
            echo '## pytest output (last 150 lines)'
            echo '```'
            tail -n 150 pytest_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish pytest failure detail as a check run (Milestone 38 fix)
        # Milestone 37's original fix (appending to $GITHUB_STEP_SUMMARY
        # alone) turned out not to work as intended -- confirmed directly
        # by checking the resulting check-run's `output.summary` field via
        # the public API after that fix shipped: it was still `null`.
        # $GITHUB_STEP_SUMMARY only populates the run's "Summary" tab in
        # the web UI (needs JS to render, no public REST endpoint reads
        # it) -- a genuinely different surface from a check run's `output`
        # field, which the public, unauthenticated check-runs API DOES
        # expose. This step creates a SEPARATE, purpose-built check run
        # (github.rest.checks.create) whose `output.summary` is the real
        # pytest tail, using the workflow's own automatically-provisioned
        # `GITHUB_TOKEN` (ephemeral, scoped only to this run, not an
        # operator-supplied secret) -- `permissions.checks: write` above
        # grants it the needed scope explicitly regardless of repo
        # default token settings.
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('backend/pytest_output.log', 'utf8');
            const lines = log.split('\n');
            const tail = lines.slice(-150).join('\n');
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'pytest-failure-detail',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'neutral',
              output: {
                title: 'pytest output (last 150 lines)',
                summary: '```\n' + tail + '\n```',
              },
            });
